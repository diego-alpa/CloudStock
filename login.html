<head>
    <title>Login Cloud</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="container-md">
        <h1 class="text-center mt-4">CloudStock</h1>

        <div class="row mt-4 justify-content-center">
            <div class="col-md-6">
                <nav class="navbar navbar-dark bg-dark">
                    <div class="container-fluid justify-content-center">
                        <a class="navbar-brand">Inicie sesión</a>
                    </div>
                </nav>
            </div>


            <div class="row mt-4 justify-content-center">

                <div class="col-md-6">

                    <form>
                        <div class="mb-3">
                            <label class="form-label">RUC o Razón Social</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control">
                        </div>
                        <a href="dashboard.html" class="btn btn-primary w-100">
                                Iniciar Sesión
                        </a>
                    </form>

                    <div class="alert alert-success mt-3">
                        Aun no a se ha registrado?
                        <a href="register.html" class="btn btn-link text-decoration-none p-0">
                            Registrarse
                        </a>

                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
